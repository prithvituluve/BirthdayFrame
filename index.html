<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Frame Generator</title>

<style>
    @font-face {
        font-family: 'MyFont';
        src: url('./fonts/myfont.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 20px 12px 40px;
        font-family: Arial, sans-serif;
        text-align: center;
        background: #111;
        color: white;
    }

    h2 {
        margin-top: 0;
    }

    .container {
        position: relative;
        width: min(90vw, 500px);
        aspect-ratio: 4 / 5;
        margin: 20px auto;
        overflow: hidden;
        background: black;
        border: 2px solid #333;
        touch-action: none;
    }

    #userImage {
        position: absolute;
        top: 22%;
        left: 15%;
        width: 70%;
        height: 58%;
        object-fit: contain;
        object-position: center;
        background: black;
        border-radius: 30px;
        z-index: 1;
        cursor: grab;
        user-select: none;
        -webkit-user-drag: none;
        transform-origin: center center;
        touch-action: none;
    }

    #userImage.dragging {
        cursor: grabbing;
    }

    #frame {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 3;
        pointer-events: none;
    }

    #nameText {
        position: absolute;
        bottom: 30px;
        left: 50%;
        width: 100%;
        text-align: center;
        font-size: 35px;
        font-family: 'MyFont', sans-serif;
        z-index: 5;
        text-shadow: 0 0 10px black;
        pointer-events: none;
        transform: translateX(-50%);
        white-space: nowrap;
    }

    .controls {
        width: min(92vw, 520px);
        margin: 0 auto 16px;
        padding: 14px;
        border-radius: 16px;
        background: #1a1a1a;
    }

    .control-group {
        margin: 12px 0;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
    }

    input[type="text"],
    input[type="file"],
    input[type="range"],
    button {
        width: 100%;
    }

    input[type="text"],
    button {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #444;
    }

    input[type="text"] {
        background: #0f0f0f;
        color: white;
    }

    input[type="range"] {
        accent-color: #ff6699;
    }

    button {
        margin-top: 8px;
        background: #ff6699;
        color: white;
        font-weight: bold;
        border: none;
        cursor: pointer;
    }

    .hint {
        margin-top: 6px;
        font-size: 12px;
        color: #bbb;
    }
</style>
</head>

<body>

<h2>Birthday Frame Generator 🎂</h2>

<div class="controls">
    <div class="control-group">
        <label for="upload">Upload Photo</label>
        <input type="file" id="upload" accept="image/*">
    </div>

    <div class="control-group">
        <label for="nameInput">Enter Name</label>
        <input type="text" id="nameInput" placeholder="Enter Name">
    </div>

    <div class="control-group">
        <label for="zoom">Photo Zoom</label>
        <input type="range" id="zoom" min="0.1" max="5" step="0.01" value="1">
    </div>

    <div class="control-group">
        <label for="textSize">Text Size</label>
        <input type="range" id="textSize" min="20" max="80" step="1" value="35">
    </div>

    <button id="downloadBtn" type="button">Download HD Image</button>
    <div class="hint">Drag the photo with mouse or finger to adjust it inside the frame.</div>
</div>

<div class="container" id="container">
    <img id="userImage" src="" alt="Uploaded photo" style="display:none;">
    <div id="nameText"></div>
    <img id="frame" src="./Birthday.png" alt="Birthday frame">
</div>

<canvas id="canvas" width="1200" height="1500" style="display:none;"></canvas>

<script>
const upload = document.getElementById("upload");
const userImage = document.getElementById("userImage");
const nameInput = document.getElementById("nameInput");
const nameText = document.getElementById("nameText");
const frame = document.getElementById("frame");
const zoomSlider = document.getElementById("zoom");
const textSizeSlider = document.getElementById("textSize");
const container = document.getElementById("container");
const downloadBtn = document.getElementById("downloadBtn");

let scale = 1;
let textSize = 35;
let posX = 0;
let posY = 0;
let dragging = false;
let pointerId = null;
let startX = 0;
let startY = 0;

document.fonts.ready.then(() => {
    console.log("Font loaded");
});

upload.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) {
        return;
    }

    const reader = new FileReader();
    reader.onload = (event) => {
        userImage.src = event.target.result;
        userImage.style.display = "block";
        posX = 0;
        posY = 0;
        scale = 1;
        zoomSlider.value = "1";
        updateTransform();
    };
    reader.readAsDataURL(file);
});

nameInput.addEventListener("input", () => {
    nameText.innerText = nameInput.value;
});

textSizeSlider.addEventListener("input", () => {
    textSize = parseInt(textSizeSlider.value, 10);
    nameText.style.fontSize = textSize + "px";
});

function startDrag(e) {
    if (!userImage.src) {
        return;
    }

    dragging = true;
    pointerId = e.pointerId;
    startX = e.clientX - posX;
    startY = e.clientY - posY;
    userImage.classList.add("dragging");
    userImage.setPointerCapture(pointerId);
}

function moveDrag(e) {
    if (!dragging || e.pointerId !== pointerId) {
        return;
    }

    posX = e.clientX - startX;
    posY = e.clientY - startY;
    updateTransform();
}

function endDrag(e) {
    if (e.pointerId !== pointerId) {
        return;
    }

    dragging = false;
    userImage.classList.remove("dragging");
    userImage.releasePointerCapture(pointerId);
    pointerId = null;
}

userImage.addEventListener("pointerdown", startDrag);
userImage.addEventListener("pointermove", moveDrag);
userImage.addEventListener("pointerup", endDrag);
userImage.addEventListener("pointercancel", endDrag);

zoomSlider.addEventListener("input", () => {
    scale = parseFloat(zoomSlider.value);
    updateTransform();
});

downloadBtn.addEventListener("click", downloadImage);

function updateTransform() {
    userImage.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
}

function getContainSize(imgWidth, imgHeight, boxWidth, boxHeight) {
    const imgRatio = imgWidth / imgHeight;
    const boxRatio = boxWidth / boxHeight;

    if (imgRatio > boxRatio) {
        return {
            drawWidth: boxWidth,
            drawHeight: boxWidth / imgRatio
        };
    }

    return {
        drawWidth: boxHeight * imgRatio,
        drawHeight: boxHeight
    };
}

function roundedRect(ctx, x, y, width, height, radius) {
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
    ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
    ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
}

async function downloadImage() {
    if (!userImage.src) {
        alert("Please upload an image first");
        return;
    }

    await document.fonts.load("100px MyFont");

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const width = 1200;
    const height = 1500;

    canvas.width = width;
    canvas.height = height;

    ctx.clearRect(0, 0, width, height);
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, width, height);

    const imgX = width * 0.15;
    const imgY = height * 0.22;
    const imgBoxW = width * 0.70;
    const imgBoxH = height * 0.58;

    const previewRect = container.getBoundingClientRect();
    const previewImgBoxW = previewRect.width * 0.70;
    const previewImgBoxH = previewRect.height * 0.58;

    const moveScaleX = imgBoxW / previewImgBoxW;
    const moveScaleY = imgBoxH / previewImgBoxH;

    const baseFit = getContainSize(
        userImage.naturalWidth,
        userImage.naturalHeight,
        imgBoxW,
        imgBoxH
    );

    const finalW = baseFit.drawWidth * scale;
    const finalH = baseFit.drawHeight * scale;
    const centerX = imgX + imgBoxW / 2 + posX * moveScaleX;
    const centerY = imgY + imgBoxH / 2 + posY * moveScaleY;

    ctx.save();
    roundedRect(ctx, imgX, imgY, imgBoxW, imgBoxH, 40);
    ctx.clip();
    ctx.drawImage(
        userImage,
        centerX - finalW / 2,
        centerY - finalH / 2,
        finalW,
        finalH
    );
    ctx.restore();

    ctx.drawImage(frame, 0, 0, width, height);

    ctx.fillStyle = "white";
    ctx.font = `${Math.round((textSize / previewRect.width) * width)}px MyFont`;
    ctx.textAlign = "center";
    ctx.shadowColor = "black";
    ctx.shadowBlur = 15;
    ctx.fillText(nameInput.value, width / 2, height - 120);

    const link = document.createElement("a");
    link.download = "birthday_card.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}
</script>

</body>
</html>
