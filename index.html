<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Frame Generator</title>

<style>
    @font-face {
        font-family: 'MyFont';
        src: url('./fonts/myfont.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }

    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #111;
        color: white;
    }

    .container {
        position: relative;
        width: 90%;
        max-width: 500px;
        aspect-ratio: 4/5;
        margin: 20px auto;
        overflow: hidden;
        background: black;
        border: 2px solid #333;
    }

    #userImage {
        position: absolute;
        top: 22%;
        left: 15%;
        width: 70%;
        height: 58%;
        object-fit: contain;
        object-position: center;
        background: black;
        border-radius: 30px;
        z-index: 1;
        cursor: move;
        user-select: none;
        transform-origin: center center;
    }

    #frame {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 3;
        pointer-events: none;
    }

    #nameText {
        position: absolute;
        bottom: 30px;
        width: 100%;
        text-align: center;
        font-size: 35px;
        font-family: 'MyFont', sans-serif;
        z-index: 5;
        text-shadow: 0 0 10px black;
        pointer-events: none;
    }

    .controls { margin: 20px; }
    input, button { margin: 10px; padding: 8px; }
</style>
</head>

<body>

<h2>Birthday Frame Generator 🎂</h2>

<div class="controls">
    <input type="file" id="upload" accept="image/*"><br>
    <input type="text" id="nameInput" placeholder="Enter Name"><br>

    Zoom:
    <input type="range" id="zoom" min="0.1" max="5" step="0.01" value="1">
    <br>
    <button onclick="downloadImage()">Download HD Image</button>
</div>

<div class="container" id="container">
    <img id="userImage" src="" style="display:none;">
    <div id="nameText"></div>
    <img id="frame" src="./Birthday.png">
</div>

<canvas id="canvas" width="1200" height="1500" style="display:none;"></canvas>

<script>
const upload = document.getElementById("upload");
const userImage = document.getElementById("userImage");
const nameInput = document.getElementById("nameInput");
const nameText = document.getElementById("nameText");
const frame = document.getElementById("frame");
const zoomSlider = document.getElementById("zoom");
const container = document.getElementById("container");

let scale = 1;
let posX = 0, posY = 0;
let dragging = false, startX, startY;

document.fonts.ready.then(() => {
    console.log("Font loaded");
});

upload.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            userImage.src = event.target.result;
            userImage.style.display = "block";
            posX = 0;
            posY = 0;
            scale = 1;
            zoomSlider.value = 1;
            updateTransform();
        };
        reader.readAsDataURL(file);
    }
});

nameInput.addEventListener("input", () => {
    nameText.innerText = nameInput.value;
});

userImage.addEventListener("mousedown", (e) => {
    dragging = true;
    startX = e.clientX - posX;
    startY = e.clientY - posY;
});

document.addEventListener("mouseup", () => dragging = false);

document.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    posX = e.clientX - startX;
    posY = e.clientY - startY;
    updateTransform();
});

zoomSlider.addEventListener("input", () => {
    scale = parseFloat(zoomSlider.value);
    updateTransform();
});

function updateTransform() {
    userImage.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
}

function getContainSize(imgWidth, imgHeight, boxWidth, boxHeight) {
    const imgRatio = imgWidth / imgHeight;
    const boxRatio = boxWidth / boxHeight;

    let drawWidth, drawHeight;

    if (imgRatio > boxRatio) {
        drawWidth = boxWidth;
        drawHeight = boxWidth / imgRatio;
    } else {
        drawHeight = boxHeight;
        drawWidth = boxHeight * imgRatio;
    }

    return { drawWidth, drawHeight };
}

async function downloadImage() {
    if (!userImage.src) {
        alert("Please upload an image first");
        return;
    }

    await document.fonts.load("100px MyFont");

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const WIDTH = 1200;
    const HEIGHT = 1500;

    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    const imgX = WIDTH * 0.15;
    const imgY = HEIGHT * 0.22;
    const imgBoxW = WIDTH * 0.70;
    const imgBoxH = HEIGHT * 0.58;

    const previewRect = container.getBoundingClientRect();
    const previewW = previewRect.width;
    const previewH = previewRect.height;

    const previewImgBoxW = previewW * 0.70;
    const previewImgBoxH = previewH * 0.58;

    const moveScaleX = imgBoxW / previewImgBoxW;
    const moveScaleY = imgBoxH / previewImgBoxH;

    const naturalW = userImage.naturalWidth;
    const naturalH = userImage.naturalHeight;

    const baseFit = getContainSize(naturalW, naturalH, imgBoxW, imgBoxH);

    const finalW = baseFit.drawWidth * scale;
    const finalH = baseFit.drawHeight * scale;

    const centerX = imgX + imgBoxW / 2 + posX * moveScaleX;
    const centerY = imgY + imgBoxH / 2 + posY * moveScaleY;

    ctx.save();

    const radius = 40;
    roundedRect(ctx, imgX, imgY, imgBoxW, imgBoxH, radius);
    ctx.clip();

    ctx.drawImage(
        userImage,
        centerX - finalW / 2,
        centerY - finalH / 2,
        finalW,
        finalH
    );

    ctx.restore();

    ctx.drawImage(frame, 0, 0, WIDTH, HEIGHT);

    ctx.fillStyle = "white";
    ctx.font = "100px MyFont";
    ctx.textAlign = "center";
    ctx.shadowColor = "black";
    ctx.shadowBlur = 15;
    ctx.fillText(nameInput.value, WIDTH / 2, HEIGHT - 120);

    const link = document.createElement("a");
    link.download = "birthday_card.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}

function roundedRect(ctx, x, y, width, height, radius) {
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
    ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
    ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
}
</script>

</body>
</html>
