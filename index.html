<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Frame Generator</title>

<style>
    /* ✅ CUSTOM FONT */
    @font-face {
        font-family: 'MyFont';
        src: url('./fonts/MyFont.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }

    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #111;
        color: white;
    }

    .container {
        position: relative;
        width: 90%;
        max-width: 500px;
        aspect-ratio: 4/5;
        margin: 20px auto;
        overflow: hidden;
        background: black;
        border: 2px solid #333;
    }

    #userImage {
        position: absolute;
        top: 22%;
        left: 15%;
        width: 70%;
        height: 58%;
        object-fit: cover;
        border-radius: 30px;
        z-index: 1;
        cursor: move;
        user-select: none;
    }

    #frame {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 3;
        pointer-events: none;
    }

    /* ✅ CUSTOM FONT APPLIED */
    #nameText {
        position: absolute;
        bottom: 30px;
        width: 100%;
        text-align: center;
        font-size: 35px;
        font-weight: bold;
        font-family: 'MyFont', sans-serif;
        z-index: 5;
        text-shadow: 0 0 10px black;
        pointer-events: none;
    }

    .controls { margin: 20px; }
    input, button { margin: 10px; padding: 8px; }
</style>
</head>

<body>

<h2>Birthday Frame Generator 🎂</h2>

<div class="controls">
    <input type="file" id="upload" accept="image/*"><br>
    <input type="text" id="nameInput" placeholder="Enter Name"><br>
    
    Zoom:
    <input type="range" id="zoom" min="0.1" max="5" step="0.01" value="1">
    <br>
    <button onclick="downloadImage()">Download HD Image</button>
</div>

<div class="container" id="container">
    <img id="userImage" src="" style="display:none;">
    <div id="nameText"></div>

    <!-- ✅ FRAME IMAGE -->
    <img id="frame" src="./Birthday.png">
</div>

<canvas id="canvas" width="1200" height="1500" style="display:none;"></canvas>

<script>
const upload = document.getElementById("upload");
const userImage = document.getElementById("userImage");
const nameInput = document.getElementById("nameInput");
const nameText = document.getElementById("nameText");
const frame = document.getElementById("frame");
const zoomSlider = document.getElementById("zoom");

let scale = 1;
let posX = 0, posY = 0;
let dragging = false, startX, startY;

// Frame check
frame.onload = () => console.log("Frame loaded");
frame.onerror = () => alert("Frame not found! Check file path.");

// Upload Image
upload.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            userImage.src = event.target.result;
            userImage.style.display = "block";
            posX = 0; posY = 0; scale = 1;
            zoomSlider.value = 1;
            updateTransform();
        };
        reader.readAsDataURL(file);
    }
});

// Name input
nameInput.addEventListener("input", () => {
    nameText.innerText = nameInput.value;
});

// Dragging
userImage.addEventListener("mousedown", (e) => {
    dragging = true;
    startX = e.clientX - posX;
    startY = e.clientY - posY;
});

document.addEventListener("mouseup", () => dragging = false);

document.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    posX = e.clientX - startX;
    posY = e.clientY - startY;
    updateTransform();
});

// Zoom
zoomSlider.addEventListener("input", () => {
    scale = parseFloat(zoomSlider.value);
    updateTransform();
});

function updateTransform() {
    userImage.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
}

// ✅ DOWNLOAD FUNCTION WITH FONT FIX
async function downloadImage() {
    if (!userImage.src) {
        alert("Please upload an image first");
        return;
    }

    // Wait for font
    await document.fonts.load("bold 100px MyFont");

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const container = document.getElementById("container");

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const ratio = canvas.width / container.clientWidth;

    // Draw user image
    ctx.save();
    const imgCenterX = (container.clientWidth * 0.15 + (container.clientWidth * 0.70) / 2) * ratio;
    const imgCenterY = (container.clientHeight * 0.22 + (container.clientHeight * 0.58) / 2) * ratio;

    ctx.translate(imgCenterX + (posX * ratio), imgCenterY + (posY * ratio));
    ctx.scale(scale, scale);

    const drawW = (container.clientWidth * 0.70) * ratio;
    const drawH = (container.clientHeight * 0.58) * ratio;

    ctx.drawImage(userImage, -drawW/2, -drawH/2, drawW, drawH);
    ctx.restore();

    // Draw frame
    if (frame.complete) {
        ctx.drawImage(frame, 0, 0, canvas.width, canvas.height);
    } else {
        alert("Frame not loaded yet!");
        return;
    }

    // Draw text with custom font
    ctx.fillStyle = "white";
    ctx.font = "bold 100px MyFont";
    ctx.textAlign = "center";
    ctx.shadowColor = "black";
    ctx.shadowBlur = 15;

    ctx.fillText(nameInput.value, canvas.width / 2, canvas.height - 120);

    // Download
    const link = document.createElement("a");
    link.download = "birthday_card.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}
</script>

</body>
</html>
